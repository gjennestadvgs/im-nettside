<!DOCTYPE html>
<html lang="no">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galleri – IM Nettside</title>
    <meta name="description" content="Bildegalleri med album fra ulike prosjekter">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* ===== GALLERI-SIDE STILER ===== */
        body {
            background: #0f0f13;
            color: #fff;
            font-family: 'Inter', sans-serif;
            padding: 0;
            min-height: 100vh;
        }

        /* Side-header */
        .galleri-header {
            text-align: center;
            padding: 100px 20px 40px;
        }

        .galleri-header h1 {
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 700;
            background: linear-gradient(135deg, #fff 30%, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 0 0 12px;
        }

        .galleri-header p {
            color: #888;
            font-size: 1rem;
            font-weight: 300;
            margin: 0;
        }

        /* ===== ALBUM GRID ===== */
        .album-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
            padding: 20px 40px 60px;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* ===== ENKELT ALBUM-KORT ===== */
        .album-kort {
            position: relative;
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            background: #ffffff;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            aspect-ratio: 4/3;
        }

        .album-kort:hover {
            transform: translateY(-6px) scale(1.02);
            box-shadow: 0 20px 60px rgba(167, 139, 250, 0.25);
            border-color: rgba(167, 139, 250, 0.3);
        }

        /* Cover-bilde (vises alltid) */
        .album-cover {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.4s ease;
        }

        .album-kort:hover .album-cover {
            transform: scale(1.08);
        }

        /* Mørk gradient overlay */
        .album-overlay {
            position: absolute;
            inset: 0;
            transition: opacity 0.3s ease;
        }

        /* Album-info (navn + antall bilder) */
        .album-info {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 20px;
            z-index: 2;
            transition: transform 0.3s ease;
        }

        .album-kort:hover .album-info {
            transform: translateY(-4px);
        }

        .album-navn {
            font-size: 1.1rem;
            font-weight: 600;
            margin: 0 0 4px;
            color: #fff;
        }

        .album-antall {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.6);
            font-weight: 300;
        }

        /* ===== HOVER-PANEL MED ALLE BILDER ===== */
        .album-bilder-panel {
            position: absolute;
            inset: 0;
            background: rgba(10, 10, 18, 0.97);
            backdrop-filter: blur(4px);
            z-index: 10;
            display: grid;
            gap: 4px;
            padding: 12px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.35s ease;
            overflow: hidden;
            border-radius: 16px;
        }

        /* Grid-størrelse basert på antall bilder */
        .album-bilder-panel.grid-1 {
            grid-template-columns: 1fr;
            grid-template-rows: 1fr;
        }

        .album-bilder-panel.grid-2 {
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr;
        }

        .album-bilder-panel.grid-3 {
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
        }

        .album-bilder-panel.grid-4 {
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
        }

        .album-bilder-panel.grid-many {
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
        }

        .album-kort:hover .album-bilder-panel {
            opacity: 1;
            pointer-events: auto;
        }

        .album-bilde-thumbnail {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 8px;
            transition: transform 0.2s ease, opacity 0.2s ease;
            opacity: 0.85;
        }

        .album-bilde-thumbnail:hover {
            transform: scale(1.05);
            opacity: 1;
        }

        /* "Se alle"-badge når det er for mange bilder */
        .se-alle-badge {
            position: relative;
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(167, 139, 250, 0.15);
            font-size: 0.9rem;
            font-weight: 600;
            color: #a78bfa;
            border: 1px solid rgba(167, 139, 250, 0.3);
            cursor: pointer;
        }

        /* Panel-tittel øverst i hover-panelet */
        .panel-tittel {
            position: absolute;
            top: 12px;
            left: 12px;
            right: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            z-index: 11;
            pointer-events: none;
            background: linear-gradient(to bottom, rgba(10, 10, 18, 0.9), transparent);
            padding-bottom: 8px;
        }

        /* ===== LIGHTBOX ===== */
        #lightbox {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.92);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            backdrop-filter: blur(8px);
        }

        #lightbox.aktiv {
            opacity: 1;
            pointer-events: auto;
        }

        #lightbox img {
            max-width: 90vw;
            max-height: 88vh;
            border-radius: 12px;
            object-fit: contain;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8);
            transform: scale(0.9);
            transition: transform 0.3s ease;
        }

        #lightbox.aktiv img {
            transform: scale(1);
        }

        #lightbox-lukk {
            position: absolute;
            top: 24px;
            right: 28px;
            font-size: 2rem;
            color: rgba(255, 255, 255, 0.6);
            cursor: pointer;
            background: none;
            border: none;
            line-height: 1;
            transition: color 0.2s;
        }

        #lightbox-lukk:hover {
            color: #fff;
        }
    </style>
</head>

<body>
    <!-- NAVIGASJON -->
    <ul id="knapper">
        <li><a id="menuButton" class="klikk-knapp" data-target="menuContent"><i class="fa-solid fa-bars"></i></a></li>
    </ul>

    <div id="menuContent" class="hidden">
        <ul>
            <li><a id="prosjekterKnapp" class="klikk-knapp" data-target="prosjekt-liste">Prosjekter</a></li>
            <li><a href="galleri.html">Galleri</a></li>
            <li><a href="om-meg.html">Om meg</a></li>
        </ul>
    </div>

    <div id="prosjekt-liste" class="hidden">
        <ul>
            <li><a href="prosjekt.html?id=test-id">test</a></li>
        </ul>
    </div>

    <!-- SIDE-HEADER -->
    <div class="galleri-header">
        <h1>Galleri</h1>
        <p>Hover over et album for å se bildene</p>
    </div>

    <!-- ALBUM GRID (genereres av JavaScript) -->
    <div class="album-grid" id="albumGrid">
        <!-- Albumene lastes inn dynamisk -->
    </div>

    <script src="script.js"></script>
    <script>
        // =====================================================
        //  ALBUM-DATA – Legg til eller endre album her
        // =====================================================
        const album = [
            {
                navn: "Fotoprosjekt",
                coverBilde: "Assets/bilder/DSC09166.png",
                bilder: [
                    "Assets/bilder/DSC09166.png",
                    "Assets/bilder/DSC09176.png",
                    "Assets/bilder/DSC09200.png",
                    "Assets/bilder/DSC09244.png",
                    "Assets/bilder/DSC09284.png",
                    "Assets/bilder/DSC09303.png",
                    "Assets/bilder/DSC09322.png",
                    "Assets/bilder/DSC09337.png",
                ]
            },
            {
                navn: "Film & Plakater",
                coverBilde: "Assets/bilder/Filmplakat_above-the-law.jpg",
                bilder: [
                    "Assets/bilder/Filmplakat_above-the-law.jpg",
                    "Assets/bilder/Document.png",
                ]
            },
            {
                navn: "Design",
                coverBilde: "Assets/bilder/Uten navn-1.png",
                bilder: [
                    "Assets/bilder/Uten navn-1.png",
                    "Assets/bilder/Document.png",
                ]
            }
        ];

        // =====================================================
        //  BYGG ALBUM-GRIDDET
        // =====================================================
        const grid = document.getElementById('albumGrid');

        album.forEach(a => {
            const kort = document.createElement('div');
            kort.className = 'album-kort';

            // Cover-bilde
            const cover = document.createElement('img');
            cover.className = 'album-cover';
            cover.src = a.coverBilde;
            cover.alt = a.navn;
            kort.appendChild(cover);

            // Overlay
            const overlay = document.createElement('div');
            overlay.className = 'album-overlay';
            kort.appendChild(overlay);

            // Info-seksjon (navn + antall)
            const info = document.createElement('div');
            info.className = 'album-info';
            info.innerHTML = `
                <div class="album-navn">${a.navn}</div>
                <div class="album-antall"><i class="fa-solid fa-images" style="margin-right:5px; opacity:0.6"></i>${a.bilder.length} bilder</div>
            `;
            kort.appendChild(info);

            // Hover-panel med alle bilder
            const panel = document.createElement('div');
            panel.className = 'album-bilder-panel';

            // Tittel i panelet
            const panelTittel = document.createElement('div');
            panelTittel.className = 'panel-tittel';
            panelTittel.textContent = a.navn;
            panel.appendChild(panelTittel);

            // Bestem grid-klasse
            const n = a.bilder.length;
            if (n === 1) panel.classList.add('grid-1');
            else if (n === 2) panel.classList.add('grid-2');
            else if (n === 3) panel.classList.add('grid-3');
            else if (n === 4) panel.classList.add('grid-4');
            else panel.classList.add('grid-many');

            // Maks 9 thumbnails vises i panelet
            const MAX_SYNLIG = 9;
            const synligBilder = a.bilder.slice(0, MAX_SYNLIG);

            synligBilder.forEach((src, i) => {
                if (i === MAX_SYNLIG - 1 && a.bilder.length > MAX_SYNLIG) {
                    // Siste slot: "Se alle"-knapp
                    const badge = document.createElement('div');
                    badge.className = 'se-alle-badge';
                    badge.textContent = `+${a.bilder.length - MAX_SYNLIG + 1} til`;
                    panel.appendChild(badge);
                } else {
                    const img = document.createElement('img');
                    img.className = 'album-bilde-thumbnail';
                    img.src = src;
                    img.alt = `${a.navn} – bilde ${i + 1}`;
                    img.style.marginTop = i === 0 ? '20px' : '0'; // plass til tittel
                    img.addEventListener('click', (e) => {
                        e.stopPropagation();
                        apneLightbox(src);
                    });
                    panel.appendChild(img);
                }
            });

            kort.appendChild(panel);
            grid.appendChild(kort);
        });

        // =====================================================
        //  LIGHTBOX
        // =====================================================
        const lightbox = document.getElementById('lightbox');
        const lightboxBilde = document.getElementById('lightbox-bilde');
        const lightboxLukk = document.getElementById('lightbox-lukk');

        function apneLightbox(src) {
            lightboxBilde.src = src;
            lightbox.classList.add('aktiv');
        }

        function lukkLightbox() {
            lightbox.classList.remove('aktiv');
        }

        lightboxLukk.addEventListener('click', lukkLightbox);
        lightbox.addEventListener('click', (e) => {
            if (e.target === lightbox) lukkLightbox();
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') lukkLightbox();
        });
    </script>
</body>

</html>
