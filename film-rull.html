<!doctype html>
<html>

<head>
    <title>Prosjekt</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="terminal.css">
    <style>
        .flex-container::before {
            top: 15px;
        }

        .flex-container::after {
            bottom: 15px;
        }

        .bilde-kolonne {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
        }

        .bilde-kolonne img,
        .bilde-kolonne video {
            width: 100%;
            max-width: 350px;
            height: auto;
            border-radius: 4px;
            border: 2px solid #333;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.7);
            /* Litt dempet farge og kontrast for en klassisk film-look */
            filter: grayscale(15%) sepia(10%);
        }

        .inhold {
            margin: 0;
            display: flex;
            flex-direction: column;
            text-align: left;
            background: rgba(255, 255, 255, 0.04);
            padding: 30px;
            border-left: 4px solid #666;
            border-radius: 6px;
        }

        .inhold h1 {
            margin-top: 0;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 1px solid #444;
            padding-bottom: 15px;
            font-size: 2.2rem;
        }

        .inhold p {
            line-height: 1.7;
            font-size: 1.15rem;
            color: #ddd;
        }
    </style>
</head>

<body>
    <div class="flex-container">
        <div class="bilde-kolonne" id="bilde-kolonne"></div>
        <div class="inhold" id="inhold"></div>
        <div class="film" id="film"></div>
    </div>
    <script>
        // Prosjekt-array
        const prosjekter = [
            {
                id: "test-id",
                tittel: "test",
                bilde: "Assets/bilder/filmplakat_above-the-law.jpg",
                tekstfil: "Assets/tekst/test.txt",
            }
        ];

        // Hent prosjekt-ID fra URL
        function getQueryParam(name) {
            const url = new URL(window.location.href);
            return url.searchParams.get(name);
        }

        function visProsjekt() {
            const id = getQueryParam('id');
            const prosjekt = prosjekter.find(p => p.id === id);
            if (!prosjekt) {
                document.querySelector('.inhold').innerHTML = "<h1>Prosjekt ikke funnet</h1>";
                document.querySelector('.bilde-kolonne').innerHTML = "";
                return;
            }

            // film
            let filmHtml = prosjekt.film
                ? `<video controls style="width:100%; max-width:350px; border-radius:8px; margin:0 auto; display:block;">
                    <source src="${prosjekt.film}" type="video/mp4">
                    Nettleseren din støtter ikke videoavspilling.
                  </video>`
                : '';

            // Bilde eller ikon
            let bildeHtml = prosjekt.bilde
                ? `<img src="${prosjekt.bilde}" alt="${prosjekt.tittel}">`
                : prosjekt.ikon ? `<i class="${prosjekt.ikon}" style="font-size:220px; color:#24292f; width:100%; height:450px; display:block; text-align:center; line-height:450px;"></i>` : '';

            document.querySelector('.bilde-kolonne').innerHTML = filmHtml + bildeHtml;

            // Hent tekst fra fil
            fetch(prosjekt.tekstfil)
                .then(response => response.text())
                .then(data => {
                    const deler = data.split('---');
                    // Behold avsnitt: del opp på dobbel linjeskift og lag <p> for hvert
                    const avsnitt = deler[0]
                        .split(/\n\s*\n/) // Del på tom linje (avsnitt)
                        .map(a => `<p>${a.trim()}</p>`)
                        .join('');
                    document.querySelector('.inhold').innerHTML = `
            <h1>${prosjekt.tittel}</h1>
            ${avsnitt}
          `;
                })
                .catch(() => {
                    document.querySelector('.inhold').innerHTML = `
            <h1>${prosjekt.tittel}</h1>
            <p>Fant ikke prosjektbeskrivelse.</p>   
          `;
                });

        }

        document.addEventListener('DOMContentLoaded', visProsjekt);
    </script>
</body>

<script src="terminal.js"></script>
<script src="kommandoer.js"></script>

</html>
