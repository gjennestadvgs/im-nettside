<!DOCTYPE html>
    <html lang="no">
        <head>
            <title>IM nettside</title>
            <link rel="stylesheet" href="style.css">
        </head>
        <body>
            <h1>Overskrift her</h1>

            <script src="script.js"></script>
            <script>
                const images = document.querySelectorAll('img.move-img');
                let x = 0, y = 50
                let moveX = 0, moveY = 0;


                function moveImages() {
                    x += moveX;
                    y += moveY;
                    images.forEach(img => {
                        img.style.left = x + '%';
                    });

                }


                document.documentElement.style.overflow = 'hidden';
            </script>
        </body>
    </html>
