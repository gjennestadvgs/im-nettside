<!DOCTYPE html>
<html lang="no">

<head>
    <title>IM nettside</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="terminal.css">
    <style>
        .loader-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #2c3e50;
            /* Fargen på bakgrunnen */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            /* Gjør at den ligger over alt annet */
            transition: opacity 0.5s ease-out, visibility 0.5s;
        }

        /* Selve animasjonssirkelen */
        .loader {
            border: 8px solid #f3f3f3;
            border-top: 8px solid #3498db;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        /* Teksten under sirkelen */
        .loader-wrapper p {
            color: white;
            font-family: sans-serif;
        }

        /* Definerer snurre-animasjonen */
        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        /* Klasse som legges til med JS for å skjule skjermen */
        .loader-hidden {
            opacity: 0;
            visibility: hidden;
        }
    </style>
</head>
<div class="prosjekt-grid">
    <img src="Assets\bilder\test-bilde.jpg" class="main-assets" data-link="film-rull.html?id=test-id"
            style="max-width:30vw;max-height:30vh; top: 60vh; left: 80vw" alt="test">
    <img src="Assets\bilder\Filmplakat_above-the-law.jpg" class="main-assets" data-link="polaroid.html?id=test-id"
            style="max-width:50vw;max-height:50vh; top: 10vh; left: 5vw" alt="test">
</div>
</body>
<script src="script.js"></script>
<script src="terminal.js"></script>
<script src="kommandoer.js"></script>

<script>
    const img = document.querySelectorAll('.main-assets')
    let isDragging = false;
    let currentImage = null;
    let offsetX, offsetY;
    let maxZ = 1;
    let mouseHasMoved = false;
    let imgLink = null;

    img.forEach(img => {
        img.addEventListener('mousedown', (e) => {
            isDragging = true;
            mouseHasMoved = false;
            imgLink = img.dataset.link;
            maxZ += 1;
            currentImage = img;
            currentImage.style.zIndex = maxZ;
            offsetX = e.clientX - img.getBoundingClientRect().left;
            offsetY = e.clientY - img.getBoundingClientRect().top;
            e.preventDefault();
        });
    });

    document.addEventListener('mousemove', (e) => {
        if (isDragging && currentImage) {
            mouseHasMoved = true;
            currentImage.style.left = (e.clientX - offsetX) + 'px';
            currentImage.style.top = (e.clientY - offsetY) + 'px';
        }
    });

    document.addEventListener('mouseup', () => {
        if (!mouseHasMoved && imgLink) {
            console.log(imgLink);
            window.location.assign(imgLink);
        }
        isDragging = false;
        currentImage = null;
    })
</script>
</body>

</html>
