<!DOCTYPE html>
    <html lang="no">
        <head>
            <title>IM nettside</title>
            <link rel="stylesheet" href="style.css">
        </head>
        <body>
            <h1 style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 100;">Overskrift her</h1>
            <img src="Assets/bilder/filmplakat_above-the-law.jpg" alt="Bilde" class="move-img" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);">
            
            <script src="script.js"></script>
            <script>
                const images = document.querySelectorAll('img.move-img');
                
                const zoomSpeed = 1
                let x = 50, y = 50;
                let centerDistance = 0;
                let moveX, moveY;

                function setDir() {
                    let dir = Math.random() * 320;
                    let angleInRadians = dir * (Math.PI / 180);
                    moveX = zoomSpeed * Math.cos(angleInRadians);
                    moveY = zoomSpeed * Math.sin(angleInRadians);
                    x = 50, y = 50;
                }
                setDir();

                function moveImages() {
                    x += moveX;
                    y += moveY;
                    centerDistance = getDistanceToCenter(images[0])
                    images.forEach(img => {
                        img.style.left = x + 'vw';
                        img.style.top = y + 'vh';
                        img.style.height = centerDistance + 'vh';
                        img.style.zIndex = centerDistance;
                    });
                    if (isElementOffScreen(images[0])) {setDir()}


                    requestAnimationFrame(moveImages)
                }

                moveImages();

                document.documentElement.style.overflow = 'hidden';
            </script>
        </body>
    </html>
