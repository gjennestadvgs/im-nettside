<!DOCTYPE html>
<html lang="no">

<head>
    <title>IM nettside</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="terminal.css">
    <style>
        .loader-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #2c3e50;
            /* Fargen på bakgrunnen */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            /* Gjør at den ligger over alt annet */
            transition: opacity 0.5s ease, visibility 0.5s;
        }

        /* Selve animasjonssirkelen */
        .loader {
            border: 8px solid #f3f3f3;
            border-top: 8px solid #3498db;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        /* Teksten under sirkelen */
        .loader-wrapper p {
            color: white;
            font-family: sans-serif;
        }

        /* Definerer snurre-animasjonen */
        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        /* Klasse som legges til med JS for å skjule skjermen */
        .loader-hidden {
            opacity: 0;
            visibility: hidden;
        }
    </style>
</head>

<body>
    <div class="loader-wrapper">
        <div class="loader"></div>
        <p>Laster siden...</p>
    </div>
    <div class="prosjekt-grid">
        <a href="film-rull.html?id=test-id">
            <img src="Assets/bilder/filmplakat_above-the-law.jpg"
                style="max-width:70vw;max-height:70vh;border-radius:12px;box-shadow:0 0 24px #000;" alt="test">
        </a>
    </div>
    <script src="script.js"></script>
    <script src="terminal.js"></script>
    <script src="kommandoer.js"></script>
</body>

</html>
